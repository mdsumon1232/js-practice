<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>practice- 20</title>
  </head>
  <body>
    <script>
      const text = prompt("Enter a text");

      if (text.length < 1) {
        alert("Word must be minimum 1 character long");
      } else if (text.length === 1) {
        alert(text);
      } else {
        const firstChar = text.at(0);
        const lastChar = text.at(-1);
        const middleChar = text.slice(1, -1);

        const newText = lastChar + middleChar + firstChar;
        alert(newText);
      }
    </script>
  </body>
</html>
