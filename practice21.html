<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice 21</title>
  </head>
  <body>
    <script>
      const text = prompt("Enter a word");

      if (text === "" || text == null) {
        alert("Please enter a valid text");
      } else if (text.length === 1) {
        alert(text);
      } else {
        const firstChar = text.at(0);

        const newText = firstChar + text + firstChar;
        alert(newText);
      }
    </script>
  </body>
</html>
